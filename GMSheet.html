<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF2e GM 세션 관리</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyCM0_tctWtlRY08fVmcBaVrk2-mNb--SQM",
  authDomain: "pf2e-sheets.firebaseapp.com",
  projectId: "pf2e-sheets",
  storageBucket: "pf2e-sheets.firebasestorage.app",
  messagingSenderId: "967668320246",
  appId: "1:967668320246:web:6e012c3069d4fd2f33e9d7"
});
const auth = firebase.auth();
const db = firebase.firestore();
</script>
<style>
:root{--bg:#0e0e0e;--card:#1a1a1a;--border:#333;--gold:#f5c518;--text:#eee;--text2:#888;--blue:#3498db;--red:#c0392b;--green:#27ae60;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#111;border-bottom:1px solid var(--border);}
#top-bar h1{color:var(--gold);font-size:16px;font-weight:700;}
#auth-area{display:flex;align-items:center;gap:8px;font-size:12px;}
#auth-area button{border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:11px;}
#main{max-width:700px;margin:0 auto;padding:24px 16px;}
.section{margin-bottom:32px;}
.section h2{color:var(--gold);font-size:15px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px;}
#login-prompt{display:flex;align-items:center;justify-content:center;min-height:60vh;}
/* 세션 카드 */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;}
.session-card:hover{border-color:var(--gold);}
.session-card.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sc-name{font-weight:700;font-size:14px;}
.sc-code{font-family:monospace;letter-spacing:2px;color:var(--gold);font-size:13px;}
.sc-meta{color:var(--text2);font-size:11px;}
/* 플레이어 카드 */
.player-card{background:#222;border:1px solid #444;border-radius:6px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.player-card .name{font-weight:700;font-size:13px;}
.player-card .info{color:var(--text2);font-size:11px;}
.kick-btn{background:var(--red);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;flex-shrink:0;}
/* 버튼 */
.btn{border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;}
.btn-gold{background:var(--gold);color:#000;}
.btn-red{background:var(--red);color:#fff;}
.btn-gray{background:#444;color:#ccc;}
.btn-small{padding:4px 12px;font-size:11px;}
/* 입력 */
.input{width:100%;padding:8px;background:#222;border:1px solid #555;color:#fff;border-radius:4px;font-size:14px;}
/* 모달 */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--card);border:1px solid var(--gold);border-radius:8px;padding:24px;min-width:300px;max-width:90vw;}
/* empty */
.empty{color:var(--text2);font-size:13px;text-align:center;padding:20px;}
/* 주사위 토스트 — CharacterSheet.html과 동일 */
#dice-toast-container{position:fixed;top:12px;right:12px;z-index:99999;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-height:60vh;overflow:hidden;}
.dice-toast{pointer-events:auto;min-width:180px;max-width:260px;background:#1e1e1e;border:1px solid #444;border-left:3px solid #3498db;border-radius:10px;padding:10px 14px;box-shadow:0 6px 24px rgba(0,0,0,.5);transform:translateX(120%);opacity:0;transition:all .35s cubic-bezier(.22,1,.36,1);}
.dice-toast.show{transform:translateX(0);opacity:1;}
.dice-toast.hide{transform:translateX(120%);opacity:0;}
.dice-toast.nat20{border-color:#f1c40f;box-shadow:0 0 20px rgba(241,196,15,.4);}
.dice-toast.nat1{border-color:#e74c3c;box-shadow:0 0 20px rgba(231,76,60,.3);}
.dice-toast-who{font-size:10px;font-weight:700;color:#3498db;margin-bottom:2px;}
.dice-toast-header{display:flex;justify-content:space-between;align-items:center;}
.dice-toast-label{font-size:11px;color:#999;font-weight:600;}
.dice-toast-total{font-size:22px;font-weight:900;color:#3498db;}
.dice-toast.nat20 .dice-toast-total{color:#f1c40f;}
.dice-toast.nat1 .dice-toast-total{color:#e74c3c;}
.dice-toast-detail{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.dice-result-chip{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;}
.dice-result-chip.dice-max{box-shadow:inset 0 0 0 1px rgba(255,255,255,.5);}
.dice-result-chip.dice-min{opacity:.6;}
@media(max-width:900px){
  #dice-toast-container{top:8px;right:8px;left:8px;}
  .dice-toast{max-width:none;}
}
</style>
</head>
<body>

<div id="top-bar">
  <h1>PF2e GM 세션 관리</h1>
  <div id="auth-area">
    <button onclick="googleLogin()" style="background:#4285f4;color:#fff;">Google 로그인</button>
  </div>
</div>

<div id="login-prompt">
  <p style="color:#666;">Google 로그인이 필요합니다.</p>
</div>

<div id="main" style="display:none;">
  <!-- 세션 목록 -->
  <div class="section">
    <h2>내 세션 <button class="btn btn-gold btn-small" onclick="openCreateModal()" style="float:right;">+ 새 세션</button></h2>
    <div id="session-list"><p class="empty">로딩 중...</p></div>
  </div>

  <!-- 선택된 세션 상세 -->
  <div id="session-detail" style="display:none;" class="section">
    <h2 id="detail-title">세션 상세</h2>
    <div id="detail-code" style="margin-bottom:12px;"></div>
    <div id="detail-players"></div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:space-between;">
      <button class="btn btn-gold" onclick="startSession()">시작하기 →</button>
      <button class="btn btn-red btn-small" onclick="deleteCurrentSession()">세션 삭제</button>
    </div>
  </div>
</div>

<!-- 세션 만들기 모달 -->
<div id="create-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 style="color:var(--gold);margin-bottom:16px;">새 세션 만들기</h3>
    <input id="new-session-name" class="input" type="text" placeholder="세션 이름 (예: 멸망의 시대)" maxlength="30">
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-gray" onclick="closeCreateModal()">취소</button>
      <button class="btn btn-gold" onclick="doCreateSession()">만들기</button>
    </div>
  </div>
</div>


<script>
// ═══════════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════════
let currentUser = null;
let mySessions = [];       // [{id, name, joinCode, gmUid, players, createdAt}]
let selectedSessionId = null;
let _sessionsUnsub = null; // onSnapshot

const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode() {
  let c = '';
  for (let i = 0; i < 6; i++) c += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
  return c;
}

// ═══════════════════════════════════════════════
//  Auth
// ═══════════════════════════════════════════════
let _loginPending = false;
function googleLogin() {
  if (_loginPending) return;
  _loginPending = true;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => {
    if (e.code !== 'auth/cancelled-popup-request' && e.code !== 'auth/popup-closed-by-user')
      alert('로그인 실패: ' + e.message);
  }).finally(() => { _loginPending = false; });
}

auth.onAuthStateChanged(user => {
  currentUser = user;
  const area = document.getElementById('auth-area');
  const main = document.getElementById('main');
  const prompt = document.getElementById('login-prompt');
  if (user) {
    area.innerHTML = '<span style="color:#aaa;">' + (user.displayName || user.email) + '</span>' +
      '<button onclick="auth.signOut()" style="background:#555;color:#fff;">로그아웃</button>';
    prompt.style.display = 'none';
    main.style.display = '';
    startListening();
  } else {
    area.innerHTML = '<button onclick="googleLogin()" style="background:#4285f4;color:#fff;">Google 로그인</button>';
    prompt.style.display = 'flex';
    main.style.display = 'none';
    stopListening();
    mySessions = [];
    selectedSessionId = null;
  }
});

// ═══════════════════════════════════════════════
//  세션 목록 실시간 감시
// ═══════════════════════════════════════════════
function startListening() {
  if (!currentUser) return;
  _sessionsUnsub = db.collection('sessions')
    .where('gmUid', '==', currentUser.uid)
    .orderBy('createdAt', 'desc')
    .onSnapshot(snap => {
      mySessions = [];
      snap.forEach(doc => {
        mySessions.push({ id: doc.id, ...doc.data() });
      });
      renderSessionList();
      // 선택된 세션이 아직 있으면 상세도 갱신
      if (selectedSessionId) {
        const s = mySessions.find(s => s.id === selectedSessionId);
        if (s) renderSessionDetail(s);
        else { selectedSessionId = null; document.getElementById('session-detail').style.display = 'none'; }
      }
    }, err => {
      console.error('[sessions listen]', err);
      // index 없으면 폴백 (orderBy 없이)
      if (err.code === 'failed-precondition') {
        _sessionsUnsub = null;
        startListeningFallback();
      }
    });
}

function startListeningFallback() {
  _sessionsUnsub = db.collection('sessions')
    .where('gmUid', '==', currentUser.uid)
    .onSnapshot(snap => {
      mySessions = [];
      snap.forEach(doc => { mySessions.push({ id: doc.id, ...doc.data() }); });
      renderSessionList();
      if (selectedSessionId) {
        const s = mySessions.find(s => s.id === selectedSessionId);
        if (s) renderSessionDetail(s);
      }
    });
}

function stopListening() {
  if (_sessionsUnsub) { _sessionsUnsub(); _sessionsUnsub = null; }
  stopRollsListener();
}

// ═══════════════════════════════════════════════
//  세션 목록 렌더링
// ═══════════════════════════════════════════════
function renderSessionList() {
  const el = document.getElementById('session-list');
  if (!mySessions.length) {
    el.innerHTML = '<p class="empty">세션이 없습니다. 새 세션을 만들어보세요.</p>';
    return;
  }
  el.innerHTML = mySessions.map(s => {
    const pc = Object.keys(s.players || {}).length;
    const active = s.id === selectedSessionId ? ' active' : '';
    return '<div class="session-card' + active + '" onclick="selectSession(\'' + s.id + '\')">' +
      '<div class="sc-header"><span class="sc-name">' + (s.name || '이름 없음') + '</span><span class="sc-code">' + s.joinCode + '</span></div>' +
      '<div class="sc-meta">참가자 ' + pc + '명</div>' +
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
//  세션 상세
// ═══════════════════════════════════════════════
function selectSession(id) {
  selectedSessionId = id;
  const s = mySessions.find(s => s.id === id);
  if (!s) return;
  renderSessionList(); // active 표시 갱신
  renderSessionDetail(s);
  startRollsListener(id); // 주사위 공유 리스너
}

function renderSessionDetail(s) {
  const detail = document.getElementById('session-detail');
  detail.style.display = '';
  document.getElementById('detail-title').textContent = s.name || '세션';
  document.getElementById('detail-code').innerHTML =
    '참가 코드: <strong style="font-family:monospace;font-size:20px;letter-spacing:3px;color:var(--gold);">' + s.joinCode + '</strong>' +
    ' <button class="btn btn-gray btn-small" onclick="navigator.clipboard.writeText(\'' + s.joinCode + '\').then(()=>alert(\'복사됨!\'))">복사</button>';

  const players = s.players || {};
  const uids = Object.keys(players);
  if (!uids.length) {
    document.getElementById('detail-players').innerHTML = '<p class="empty">아직 참가한 플레이어가 없습니다.</p>';
    return;
  }
  // 플레이어 카드 렌더링 후 캐릭터 정보 비동기 로드
  document.getElementById('detail-players').innerHTML = uids.map(uid => {
    const p = players[uid];
    return '<div class="player-card">' +
      '<div><span class="name">' + (p.displayName || '???') + '</span><br><span class="info" id="pc-info-' + uid + '">로딩...</span></div>' +
      '<button class="kick-btn" onclick="kickPlayer(\'' + s.id + '\',\'' + uid + '\',\'' + (p.displayName || '???').replace(/'/g, "\\'") + '\')">추방</button>' +
    '</div>';
  }).join('');
  // 캐릭터 요약 로드 (개인 슬롯에서)
  uids.forEach(uid => {
    const slotId = players[uid]?.slotId;
    if (!slotId) { const el2 = document.getElementById('pc-info-' + uid); if (el2) el2.textContent = '슬롯 미지정'; return; }
    db.collection('users').doc(uid).collection('characters').doc(slotId).get().then(doc => {
      const el = document.getElementById('pc-info-' + uid);
      if (!el) return;
      if (doc.exists && doc.data().data) {
        try {
          const d = JSON.parse(doc.data().data);
          el.textContent = (d.name || '이름 없음') + ' — ' + (d.selectedClass || '?') + ' Lv.' + (d.level || 1);
        } catch(e) { el.textContent = '데이터 오류'; }
      } else {
        el.textContent = '빈 슬롯';
      }
    });
  });
}

// ═══════════════════════════════════════════════
//  세션 생성
// ═══════════════════════════════════════════════
function openCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('new-session-name').focus(), 100);
}
function closeCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('new-session-name').value = '';
}

async function doCreateSession() {
  if (!currentUser) return;
  const name = document.getElementById('new-session-name').value.trim() || '새 세션';
  const code = genCode();
  // 충돌 검사
  const dup = await db.collection('sessions').where('joinCode', '==', code).get();
  if (!dup.empty) return doCreateSession();

  await db.collection('sessions').add({
    gmUid: currentUser.uid,
    joinCode: code,
    name: name,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    players: {}
  });
  closeCreateModal();
  // onSnapshot이 자동으로 목록 갱신
}

// ═══════════════════════════════════════════════
//  세션 삭제
// ═══════════════════════════════════════════════
async function deleteCurrentSession() {
  if (!selectedSessionId) return;
  const s = mySessions.find(s => s.id === selectedSessionId);
  if (!s) return;
  if (!confirm('"' + (s.name||'세션') + '"을 삭제하시겠습니까?')) return;
  try {
    // rolls 서브컬렉션 삭제
    const rollSnap = await db.collection('sessions').doc(selectedSessionId).collection('rolls').get();
    const batch = db.batch();
    rollSnap.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection('sessions').doc(selectedSessionId));
    await batch.commit();
    // 플레이어 캐릭터의 sessionId는 각 클라이언트의 onSnapshot에서 자동 정리됨
  } catch(e) {
    console.error('[deleteSession]', e);
    alert('삭제 실패: ' + e.message);
  }
  selectedSessionId = null;
  document.getElementById('session-detail').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  참가자 추방
// ═══════════════════════════════════════════════
async function kickPlayer(sessionId, uid, name) {
  if (!confirm('"' + name + '"을(를) 세션에서 추방하시겠습니까?\n캐릭터는 해당 플레이어의 개인 슬롯에 그대로 유지됩니다.')) return;
  try {
    // 세션 doc에서 해당 플레이어의 slotId 확인 후 sessionId 제거
    const sessDoc = await db.collection('sessions').doc(sessionId).get();
    if (sessDoc.exists) {
      const slotId = sessDoc.data().players?.[uid]?.slotId;
      if (slotId) {
        await db.collection('users').doc(uid)
          .collection('characters').doc(slotId).update({
            sessionId: firebase.firestore.FieldValue.delete()
          });
      }
    }
    // 세션 players map에서 제거
    const playerField = 'players.' + uid;
    await db.collection('sessions').doc(sessionId).update({
      [playerField]: firebase.firestore.FieldValue.delete()
    });
  } catch(e) {
    console.error('[kickPlayer]', e);
    alert('추방 실패: ' + e.message);
  }
}

// ═══════════════════════════════════════════════
//  세션 시작 → CharacterSheet.html?gmsession=ID
// ═══════════════════════════════════════════════
function startSession() {
  if (!selectedSessionId) { alert('세션을 선택하세요.'); return; }
  window.location.href = 'CharacterSheet.html?gmsession=' + selectedSessionId;
}

// ═══════════════════════════════════════════════
//  주사위 공유 토스트 (로비에서도 플레이어 굴림 확인)
// ═══════════════════════════════════════════════
const DICE_COLORS = {4:'#e74c3c',6:'#e67e22',8:'#f1c40f',10:'#2ecc71',12:'#3498db',20:'#9b59b6',100:'#95a5a6'};
let _rollsUnsub = null;
let _rollsReady = false;

function startRollsListener(sessionId) {
  stopRollsListener();
  _rollsReady = false;
  _rollsUnsub = db.collection('sessions').doc(sessionId)
    .collection('rolls')
    .onSnapshot(function(snap) {
      if (!_rollsReady) { _rollsReady = true; return; }
      snap.docChanges().forEach(function(change) {
        if (change.type === 'added') {
          var data = change.doc.data();
          if (currentUser && data.uid !== currentUser.uid) {
            showRemoteToast(data);
          }
        }
      });
    });
}

function stopRollsListener() {
  if (_rollsUnsub) { _rollsUnsub(); _rollsUnsub = null; }
  _rollsReady = false;
}

function showRemoteToast(data) {
  var container = document.getElementById('dice-toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'dice-toast-container';
    document.body.appendChild(container);
  }
  var toast = document.createElement('div');
  toast.className = 'dice-toast' + (data.isNat20 ? ' nat20' : '') + (data.isNat1 ? ' nat1' : '');

  var diceStr = (data.dice || []).map(function(d) {
    var cls = d.value === d.sides ? 'dice-max' : d.value === 1 ? 'dice-min' : '';
    return '<span class="dice-result-chip ' + cls + '" style="background:' + (DICE_COLORS[d.sides]||'#666') + '">d' + d.sides + ':' + d.value + '</span>';
  }).join(' ');

  var mod = data.modifier || 0;
  var modStr = mod ? ' ' + (mod >= 0 ? '+' : '') + mod : '';

  toast.innerHTML =
    '<div class="dice-toast-who">🎲 ' + (data.characterName || '???') + '</div>' +
    '<div class="dice-toast-header"><span class="dice-toast-label">' + (data.label || '') + '</span><span class="dice-toast-total">' + data.total + '</span></div>' +
    '<div class="dice-toast-detail">' + diceStr + modStr + '</div>';

  container.prepend(toast);
  requestAnimationFrame(function() { toast.classList.add('show'); });
  setTimeout(function() {
    toast.classList.remove('show');
    toast.classList.add('hide');
    setTimeout(function() { toast.remove(); }, 400);
  }, 5000);
}
</script>
</body>
</html>
